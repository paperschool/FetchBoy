name: Feature Request
description: Suggest an idea for FetchBoy
title: "[Feature]: "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please fill out the details below.
  - type: textarea
    id: description
    attributes:
      label: Feature description
      description: A clear and concise description of the feature.
      placeholder: Describe the feature you want...
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem solved
      description: What problem does this feature solve?
      placeholder: Describe the problem this feature would solve...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe your proposed solution or implementation approach.
      placeholder: Describe your solution...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any alternative solutions you've considered.
      placeholder: Any alternative approaches?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context about the feature request here.
      placeholder: Any other information...
