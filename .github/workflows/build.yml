name: Build Installers

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            artifact-name: linux
          - platform: windows-latest
            artifact-name: windows
          - platform: macos-latest
            artifact-name: macos

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: fetch-boy/yarn.lock

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: fetch-boy/src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install frontend dependencies
        working-directory: fetch-boy
        run: yarn install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: fetch-boy

      - name: Check bundle sizes (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          echo "=== Linux installer sizes ==="
          find fetch-boy/src-tauri/target/release/bundle -name "*.deb" -o -name "*.AppImage" | while read f; do
            size_kb=$(du -k "$f" | cut -f1)
            size_mb=$(echo "scale=2; $size_kb/1024" | bc)
            echo "$f: ${size_mb} MB"
            # AppImages bundle the WebKit runtime (~60-70 MB), so they get a higher limit
            if [[ "$f" == *.AppImage ]]; then
              limit_kb=92160
              limit_label="90 MB"
            else
              limit_kb=15360
              limit_label="15 MB"
            fi
            if [ "$size_kb" -gt "$limit_kb" ]; then
              echo "ERROR: $f exceeds ${limit_label} limit (${size_mb} MB)"
              exit 1
            fi
          done

      - name: Check bundle sizes (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          Write-Host "=== Windows installer sizes ==="
          $limit = 15 * 1024 * 1024
          Get-ChildItem -Path fetch-boy\src-tauri\target\release\bundle -Recurse -Include *.msi,*.exe | ForEach-Object {
            $mb = [math]::Round($_.Length / 1MB, 2)
            Write-Host "$($_.FullName): $mb MB"
            if ($_.Length -gt $limit) {
              Write-Error "ERROR: $($_.Name) exceeds 15 MB limit ($mb MB)"
              exit 1
            }
          }

      - name: Check bundle sizes (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          echo "=== macOS installer sizes ==="
          find fetch-boy/src-tauri/target/release/bundle -name "*.dmg" | while read f; do
            size_kb=$(du -k "$f" | cut -f1)
            size_mb=$(echo "scale=2; $size_kb/1024" | bc)
            echo "$f: ${size_mb} MB"
            if [ "$size_kb" -gt 15360 ]; then
              echo "ERROR: $f exceeds 15 MB limit (${size_mb} MB)"
              exit 1
            fi
          done

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.artifact-name }}
          path: |
            fetch-boy/src-tauri/target/release/bundle/**/*.deb
            fetch-boy/src-tauri/target/release/bundle/**/*.AppImage
            fetch-boy/src-tauri/target/release/bundle/**/*.msi
            fetch-boy/src-tauri/target/release/bundle/**/*.exe
            fetch-boy/src-tauri/target/release/bundle/**/*.dmg
          if-no-files-found: error
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./fetch-boy/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: installers-*
          merge-multiple: false

      - name: Collect installer files
        id: files
        run: |
          # Output as JSON array to properly handle files with spaces
          # Handle empty find results gracefully by using fallback
          FILES=$(find artifacts -type f \( -name "*.dmg" -o -name "*.msi" -o -name "*.exe" -o -name "*.deb" -o -name "*.AppImage" \) | jq -s '. ' 2>/dev/null || echo "[]")
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Read files from JSON array into a bash array to properly handle spaces
          mapfile -t FILE_ARRAY < <(echo "${{ steps.files.outputs.files }}" | jq -r '.[]')
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "Fetch Boy v${{ steps.version.outputs.version }}" \
            --draft \
            --notes "$(cat <<'EOF'
          ## Downloads

          | Platform | File |
          |----------|------|
          | macOS | `.dmg` |
          | Windows | `.msi` or `.exe` |
          | Linux | `.deb` or `.AppImage` |

          ---

          ## macOS Installation Note

          Fetch Boy is not yet signed with an Apple Developer certificate. macOS will show a **"damaged and can't be opened"** error. The app is not damaged — this is Gatekeeper blocking unsigned apps.

          **To open the app, run this command in Terminal after dragging it to Applications:**

          ```bash
          xattr -cr /Applications/Fetch\ Boy.app
          ```

          You only need to do this once.

          ---

          ## Linux Installation Note

          **AppImage:** Make the file executable before running:
          ```bash
          chmod +x "Fetch Boy_${{ steps.version.outputs.version }}_amd64.AppImage"
          ```
          EOF
          )" \
            "${FILE_ARRAY[@]}"
